<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(to right, #ffdde1, #ee9ca7);
        }

        .card {
            max-width: 650px;
            margin: 50px auto;
            padding: 40px;
            background: #fff0f5;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 6px solid #c2185b;
        }

        h1 {
            color: #c2185b;
            font-size: 42px;
        }

        h2 {
            color: #444;
        }

        .names {
            font-size: 36px;
            color: #ad1457;
            margin: 20px 0;
            font-weight: bold;
        }

        .heart {
            color: red;
            font-size: 30px;
            animation: heartbeat 1s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .date {
            font-size: 22px;
            margin-top: 15px;
            color: #333;
        }

        .details {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
        }

        .footer {
            margin-top: 30px;
            font-style: italic;
            color: #777;
        }

        .love {
            font-size: 28px;
            margin: 10px 0;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="love">❤️🌹💖🌸</div>

        <h1>Wedding Invitation</h1>

        <h2>Together with their families</h2>
        <h2>invite you to celebrate the wedding of</h2>

        <div class="names">
            Nikita <span class="heart">❤️</span> Suhas
        </div>

        <div class="date">
            20th May
        </div>

        <div class="details">
            Join us in celebrating love, joy and togetherness 💞
        </div>

        <div class="footer">
            With Love ❤️<br>
            Family & Friends
        </div>

        <div class="love">🌸💖🌹❤️</div>
    </div>

</body>
</html>
