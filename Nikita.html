<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wedding Invitation</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: #fdf6f0;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #b76e79;
            font-size: 40px;
        }
        h2 {
            color: #444;
        }
        .names {
            font-size: 30px;
            margin: 20px 0;
            color: #d4af37;
        }
        .date {
            font-size: 22px;
            margin-top: 20px;
        }
        .footer {
            margin-top: 30px;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Wedding Invitation</h1>
        <h2>We are delighted to invite you to the wedding of</h2>

        <div class="names">
            Nikita ❤️ Suhas
        </div>

        <div class="date">
            On 20th May
        </div>

        <p>
            Your presence will make this occasion more special and memorable.
        </p>

        <div class="footer">
            With love,<br>
            Family & Friends
        </div>
    </div>

</body>
</html>
